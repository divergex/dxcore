  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.17.0
        env:
          CIBW_BUILD: cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_34_x86_64:latest
          CIBW_BEFORE_ALL: |
            yum install -y ninja-build gcc-c++ make python-devel
            pip install conan cmake
            conan profile detect --force
          CIBW_BEFORE_BUILD: |
            python -m pip install --upgrade pip setuptools wheel
            python -c "import sysconfig; print(sysconfig.get_paths()['include'])"
          CIBW_BUILD_VERBOSITY: 1
      - uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: wheelhouse/

  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build-wheels
    permissions:
      id-token: write

    environment:
      name: publish

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten dist directory
        run: |
          mkdir -p dist/
          find artifacts/ -name "*.whl" -o -name "*.tar.gz" | xargs -I {} cp {} dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/